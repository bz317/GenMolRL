project: GenMolRL_Bi
experiment_name: ExhaustedSearch_Bi
reaction_mode: bi
masking: reaction_valid
reward: delta_qed
# Fully exhaustive bi-reaction DFS: every (template, R2) branch is expanded
# from every starting molecule in reactants_test.pkl, up to depth 5. The
# branching factor per node is (#feasible bi-templates) * (#valid R2 per
# template), which for our 102 bi-templates and ~10^3 typical valid R2 per
# template means each start can spawn ~10^5-10^10 paths at depth 5. This
# run can therefore take a very long time; the slurm wallclock (36 h) and
# wandb's per-attempt logging provide the only soft stops.
max_episode_len: 5
dataset:
  test_file: data/Bi/reactants_test.pkl
  templates_file: data/Bi/templates.pkl
env:
  invalid_reaction_penalty: -1.0
  reward_round_digits: 3
training:
  seed: 42
search:
  # All numeric caps left unset on purpose: exhausted_search treats `None`
  # as "no limit" (see genmolrl/algorithms/search.py L69-73). The only
  # bound is `max_episode_len` above. If a particular run starts blowing
  # past wallclock, re-add caps here or pass MAX_EPISODE_LEN=4 on the
  # slurm submit line instead of editing this file.
  max_paths:
  max_reactions:
  max_starts:
  max_r2_per_template:
  results_file: runs/exhausted_search_bi_results.txt
  overwrite_results: true
  use_wandb: true
