# Informal config schema for GenMolRL experiments.
project: GenMolRL
experiment_name: string
reaction_mode: uni # uni | bi (bi = full template pool: uni + bi templates)
masking: substructure # substructure | reaction_valid | r2_available | none
reward: delta_qed # delta_qed | final_qed
max_episode_len: 5
dataset:
  training_file: path # PPO/A2C/TD3 only
  test_file: path
  templates_file: path
  start_strategy: random_pool # random_pool | cycle_pool | cycle_file | fixed | learned_policy
  start_smiles_file: null
  fixed_start_smiles: null
env:
  algorithm_family: sb3_discrete # sb3_discrete | sb3_multidiscrete | td3_pgfs
  action_design: discrete # discrete | multidiscrete_factorized | pgfs_continuous_r2 | td3_uni_discrete
  use_stop_action: true
  stop_early_penalty: 0.0
  stop_penalty_until_step: -1
  invalid_reaction_penalty: -1.0
  reward_round_digits: null
  info_qed_round_digits: null
training:
  seed: 42
  total_timesteps: 1000000
  start_timesteps: 10000
  eval_freq: 10000
  n_envs: 1
ppo:
  target_kl: null
td3:
  warmup_stop_probability: 0.1
  save_replay_buffer_in_checkpoints: false
  template_mask_kind: null # null: use YAML masking; else force mask kind for TD3 only
search:
  max_paths: null
  max_attempts: null
  max_reactions: null
  max_starts: null
  max_r2_per_template: null
  greedy_mode: best_action # best_action | positive_delta_only
  results_file: path
  overwrite_results: true
  use_wandb: true
graphtransrl:
  num_emb: 64
  num_layers: 3
  num_heads: 2
  learning_rate: 0.0001
  log_z_lr: 0.001
  random_action_prob: 0.0
  device: null
