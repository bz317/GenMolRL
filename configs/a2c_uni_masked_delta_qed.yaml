project: GenMolRL
experiment_name: A2C_Uni
reaction_mode: uni
masking: reaction_valid
reward: delta_qed
max_episode_len: 5
dataset:
  training_file: data/Uni/reactants_train.pkl
  test_file: data/Uni/reactants_test.pkl
  templates_file: data/Uni/templates_unimolecolar_explicit.pkl
  start_strategy: random_pool
env:
  algorithm_family: sb3_discrete
  action_design: discrete
  use_stop_action: true
  stop_early_penalty: 0.0
  stop_penalty_until_step: 3
  invalid_reaction_penalty: -1.0
  reward_round_digits: 3
  info_qed_round_digits: 3
training:
  seed: 42
  total_timesteps: 1000000
  eval_freq: 10000
  n_envs: 1
a2c:
  learning_rate: 0.0007
  n_steps: 5
  gamma: 0.99
  gae_lambda: 1.0
  ent_coef: 0.0
  vf_coef: 0.5
  max_grad_norm: 0.5
  device: cpu
  progress_bar: false
callbacks:
  model_save_freq: 100000
  gradient_save_freq: 100
