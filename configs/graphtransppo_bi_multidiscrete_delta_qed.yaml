project: GenMolRL_Bi
experiment_name: GraphTransPPO_Bi_MultiDiscrete_Lookup
reaction_mode: bi
# r2_available is the default bi-mode masking (see the hierarchical config
# for the full rationale). Pattern-match for T and the union-of-templates
# pattern-match for R2, with apply_reaction failures surfacing as -1.
masking: r2_available
reward: delta_qed
max_episode_len: 5
dataset:
  training_file: data/Bi/reactants_train.pkl
  test_file: data/Bi/reactants_test.pkl
  templates_file: data/Bi/templates.pkl
  start_strategy: random_pool
env:
  # GraphTransBiPPO is hand-rolled (NOT SB3 MaskablePPO). The
  # `multidiscrete` policy_arch below means π(T, R2 | R1) factorises as
  # independent per-axis masked categoricals given the graph-encoded
  # trunk z(R1) — the same factorisation SB3 MaskablePPO would learn
  # over MultiDiscrete([T+1, R2]), but with the trunk as a
  # GraphTransformer over the molecular graph instead of an MLP over a
  # Morgan fingerprint.
  algorithm_family: graphtransppo_bi_multidiscrete
  use_stop_action: true
  stop_early_penalty: -0.05
  stop_penalty_until_step: 3
  invalid_reaction_penalty: -1.0
  reward_round_digits: 3
  info_qed_round_digits: 3
training:
  seed: 42
  total_timesteps: 1000000
  eval_freq: 10000
  save_freq: 100000
graphtransppo_bi:
  # 'multidiscrete' selects the independent R2 head: the R2 query depends
  # only on z(R1), not on the sampled T. Use this only as a baseline /
  # ablation against the hierarchical variant — the R2 distribution will
  # be shared across templates, which is generally too coarse.
  policy_arch: multidiscrete
  # r2_arch controls the R2 representation (see the hierarchical YAML for
  # the full encoder_graph rationale):
  #   - 'lookup' (current default): fixed nn.Embedding for the train R2
  #     pool — one learned vector per R2 SMILES in the training pool.
  #     The R2 vocabulary is baked at training time, so eval MUST draw
  #     R2 from the SAME train pool (eval_r2_pool: train, enforced by
  #     the trainer). This matches the gr7aa7z6 / Bi-PPO lookup setup,
  #     so the only axis of comparison against Bi-PPO is the trunk
  #     encoder (graph vs Morgan-MLP).
  #   - 'encoder': MLP(morgan_fp(R2_SMILES)) — asymmetric two-tower,
  #     compatible with eval_r2_pool: test.
  #   - 'encoder_graph' (two-tower with INDEPENDENT R2 weights): R2 keys
  #     come from a SEPARATE R2 GraphTransformer (defaults: num_emb=32,
  #     1 layer) followed by a projection. Compatible with
  #     eval_r2_pool: test. The r2_num_emb / r2_num_layers /
  #     r2_num_heads / r2_keys_refresh_minibatches knobs below are
  #     commented out because they're encoder_graph-only — uncomment
  #     when flipping r2_arch back.
  #   - 'encoder_graph_shared' (true Siamese / weight-tied): R2 reuses
  #     the SAME R1 GraphTransformer module + a single projection. Try
  #     this when 'encoder_graph' underperforms — see the hierarchical
  #     YAML's r2_arch comment for the full motivation. r2_num_emb /
  #     r2_num_layers / r2_num_heads are IGNORED under this arch.
  r2_arch: lookup
  # eval_r2_pool: see configs/ppo_bi_hierarchical_delta_qed.yaml for the
  # full compatibility matrix. Forced to "train" here because r2_arch is
  # lookup — the embedding table has no rows for test reactants.
  eval_r2_pool: train
  # GraphTransformer backbone for R1 (same defaults as graphtransrl /
  # graphtransppo so the R1 trunk stays bit-comparable across the three
  # graph algorithms). Pooled R1 trunk feature dim = 2 * num_emb = 128.
  num_emb: 64
  num_layers: 3
  num_heads: 2
  # GraphTransformer backbone for R2 (encoder_graph only — DORMANT under
  # r2_arch: lookup / encoder / encoder_graph_shared). Uncomment when
  # flipping r2_arch to encoder_graph and flipping eval_r2_pool to test.
  # r2_num_emb: 32
  # r2_num_layers: 1
  # r2_num_heads: 2
  # r2_keys_refresh_minibatches still applies under encoder_graph_shared
  # (the shared R1 backbone is run over the full R2 pool every refresh).
  # r2_keys_refresh_minibatches: 8
  learning_rate: 0.0003
  n_steps: 2048
  batch_size: 64
  n_epochs: 10
  gamma: 0.99
  gae_lambda: 0.95
  clip_range: 0.2
  clip_range_vf: null
  ent_coef: 0.01
  vf_coef: 0.5
  max_grad_norm: 0.5
  target_kl: 0.02
  template_embed_dim: 64
  r2_embed_dim: 64
  # Joint-rejection retry budget — only used when masking=reaction_valid
  # AND policy_arch=multidiscrete (the union R2 mask doesn't guarantee a
  # valid joint). With masking=r2_available the loop is single-shot and
  # this knob is dormant; kept here for parity with the hierarchical
  # YAML and for the case where a user flips masking to reaction_valid.
  r2_resample_retries: 16
  normalize_advantage: true
  weight_decay: 0.0
  adam_eps: 0.00001
  device: null
