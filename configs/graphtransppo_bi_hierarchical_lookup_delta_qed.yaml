project: GenMolRL_Bi
experiment_name: GraphTransPPO_Bi_Hierarchical_Lookup
reaction_mode: bi
masking: r2_available
reward: delta_qed
max_episode_len: 5
dataset:
  training_file: data/Bi/reactants_train.pkl
  test_file: data/Bi/reactants_test.pkl
  templates_file: data/Bi/templates.pkl
  start_strategy: random_pool
env:
  algorithm_family: graphtransppo_bi_hierarchical_lookup
  use_stop_action: true
  stop_early_penalty: -0.05
  stop_penalty_until_step: 3
  invalid_reaction_penalty: -1.0
  reward_round_digits: 3
  info_qed_round_digits: 3
training:
  seed: 42
  total_timesteps: 1000000
  eval_freq: 10000
  save_freq: 100000
graphtransppo_bi:
  policy_arch: hierarchical
  r2_arch: lookup
  eval_r2_pool: train
  num_emb: 64
  num_layers: 3
  num_heads: 2
  learning_rate: 0.0003
  n_steps: 2048
  batch_size: 64
  n_epochs: 10
  gamma: 0.99
  gae_lambda: 0.95
  clip_range: 0.2
  clip_range_vf: null
  ent_coef: 0.01
  vf_coef: 0.5
  max_grad_norm: 0.5
  target_kl: 0.02
  template_embed_dim: 64
  r2_embed_dim: 64
  r2_resample_retries: 16
  normalize_advantage: true
  weight_decay: 0.0
  adam_eps: 0.00001
  device: null
