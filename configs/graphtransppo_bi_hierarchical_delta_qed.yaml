project: GenMolRL_Bi
experiment_name: GraphTransPPO_Bi_Hierarchical
reaction_mode: bi
# r2_available is the default bi-mode masking (see configs/ppo_bi_*.yaml for
# the full rationale). Under this mask GraphTransBiPPO uses the pattern-
# match R2 set, skips apply_reaction at mask construction time, and lets
# the rare sanitisation failures surface as invalid_reaction_penalty (-1)
# — the policy learns from those failures. Switch to reaction_valid for
# the zero -1 contract (slower) or to substructure for the cheapest mask.
masking: r2_available
reward: delta_qed
max_episode_len: 5
dataset:
  training_file: data/Bi/reactants_train.pkl
  test_file: data/Bi/reactants_test.pkl
  templates_file: data/Bi/templates.pkl
  start_strategy: random_pool
env:
  # GraphTransBiPPO is hand-rolled and does not use the gym
  # MoleculeDesignEnv. The fields below mirror the env settings the
  # trainer reads directly so the run is behaviour-comparable to the
  # corresponding ppo_bi YAML (only the encoder changes).
  algorithm_family: graphtransppo_bi_hierarchical
  use_stop_action: true
  stop_early_penalty: -0.05
  stop_penalty_until_step: 3
  invalid_reaction_penalty: -1.0
  reward_round_digits: 3
  info_qed_round_digits: 3
training:
  seed: 42
  # 1M steps matches the Bi-PPO baseline so the encoder swap is the only
  # axis of comparison. The GraphTransformer is ~2-3x slower per step
  # than the Morgan MLP trunk; bump n_steps / lower total_timesteps if
  # the 36h wallclock allocation is tight.
  total_timesteps: 1000000
  eval_freq: 10000
  save_freq: 100000
graphtransppo_bi:
  # GraphTransBiPPO supports both policy architectures defined in
  # ppo_bi.policy via the shared `conditional_r2` flag:
  #   - 'hierarchical' (default): π(T, R2 | R1) = π_T(T | R1) · π_R2(R2 | R1, T).
  #     The R2 query reads a learned per-template embedding alongside the
  #     graph-encoded trunk features; the R2 mask is per-(state, T).
  #   - 'multidiscrete': π(T, R2 | R1) = π_T(T | R1) · π_R2(R2 | R1). T
  #     and R2 are sampled independently given the graph embedding of R1;
  #     the R2 mask is per-state (union over valid templates).
  # Masking semantics are unchanged from ppo_bi (README's Masking Modes).
  policy_arch: hierarchical
  # r2_arch controls the R2 representation:
  #   - 'lookup' (legacy): fixed nn.Embedding for the train R2 pool; eval
  #     forced to draw R2 from the same train pool.
  #   - 'encoder' (mid-tier): R2 keys = MLP(morgan_fp(R2_SMILES)).
  #     Asymmetric two-tower (R1 = graph, R2 = fingerprint), shared
  #     across pools.
  #   - 'encoder_graph' (Option 3, current default): Siamese R2
  #     GraphTransformer + linear projection. BOTH towers are
  #     graph-encoded; R2 input is the molecular graph, not a
  #     fingerprint. Same pool-swap discipline as 'encoder' (rollout /
  #     PPO update on the train pool, evaluate() on the test pool).
  #     The R2 backbone is a SEPARATE GraphTransformer from the R1
  #     trunk — no weight tying — so each tower can be sized
  #     independently to balance modelling power against compute.
  r2_arch: encoder_graph
  # GraphTransformer backbone for R1 (same defaults as graphtransrl /
  # graphtransppo so the R1 trunk is bit-comparable across the three
  # graph algorithms). The pooled R1 trunk feature dim is 2 * num_emb = 128.
  num_emb: 64
  num_layers: 3
  num_heads: 2
  # GraphTransformer backbone for R2 (Option 3). The R2 pool is re-encoded
  # over ~116k candidate graphs during the PPO update, so the R2 side is
  # intentionally SMALLER than R1 to keep wall-clock cost manageable.
  # The pooled R2 graph feature width is 2 * r2_num_emb = 64, then
  # projected to r2_embed_dim=64 via a single Linear before the
  # dot-product head.
  r2_num_emb: 32
  r2_num_layers: 1
  r2_num_heads: 2
  # r2_keys refresh cadence (encoder_graph only). PPO minibatches between
  # full-pool R2 encodings *with gradients*. Bigger value → cheaper
  # wall-clock (fewer Siamese-R2 forwards per update) but sparser
  # gradient signal into the R2 backbone. Default 8 ≈ "twice per PPO
  # epoch" at the standard 32-minibatches-per-epoch setting. Set to 1
  # for per-minibatch gradient flow (slowest, most accurate); set to
  # n_epochs * minibatches_per_epoch for "once per update cycle"
  # (fastest, sparsest gradient).
  r2_keys_refresh_minibatches: 8
  # PPO knobs: identical to configs/ppo_bi_hierarchical_delta_qed.yaml so
  # any Bi-PPO-vs-Bi-GraphTransPPO delta is attributable to the encoder.
  # ent_coef 0.01 (vs. 0.0 for the SB3-MaskablePPO Bi path) is a touch
  # higher because the graph encoder collapses entropy faster than the
  # 1024 → 256 MLP trunk on top of Morgan fingerprints.
  learning_rate: 0.0003
  n_steps: 2048
  batch_size: 64
  n_epochs: 10
  gamma: 0.99
  gae_lambda: 0.95
  clip_range: 0.2
  clip_range_vf: null
  ent_coef: 0.01
  vf_coef: 0.5
  max_grad_norm: 0.5
  target_kl: 0.02
  # Head widths match BiPolicy so the only architectural difference is
  # the trunk encoder (graph vs Morgan-MLP). 128-d trunk → 64-d R2 query
  # → 64-d R2 embedding lookup → dot-product scoring over num_reactants.
  template_embed_dim: 64
  r2_embed_dim: 64
  r2_resample_retries: 16
  normalize_advantage: true
  weight_decay: 0.0
  adam_eps: 0.00001
  device: null
