# =============================================================================
# TD3 | uni templates | DISCRETE template-only action space (comparison baseline)
# -----------------------------------------------------------------------------
# Policy: template logits only; critic Q(s, template) with no R2 dimensions.
# No KNNWrapper. Requires reaction_mode: uni.
# Hyperparameters live here (including discrete vs continuous via env.action_design).
# W&B run name / project: set in run_genmolrl_td3_discrete.sh (EXPERIMENT_NAME, WANDB_PROJECT).
# Authoritative switch: env.action_design below (must be td3_uni_discrete).
#
# NOTE: filename still says "delta_qed" for shell-script compatibility, but the
# reward type is now ``final_qed`` (see ``reward:`` below). The switch was made
# after pthux4sd/8i1je84p/hb0g7wim all collapsed to eval/stop_rate=1.0 under
# delta_qed: with delta_qed, Q(Stop) ≈ 0 sits in the middle of the per-template
# Q distribution (templates with ΔQED<0 are below, those with ΔQED>0 are above),
# and TD3's deterministic-greedy actor argmax-collapses globally to Stop on
# every state. With final_qed, Q(template) ≈ QED(s') + γ·V(s') is on the order
# of the molecule's cumulative drug-likeness (~1-3), while Q(Stop)=0 stays
# pinned to zero. The Q-gap is ~1-3 in magnitude instead of ~0.05, so even
# averaged across states the actor's logit ranking can no longer prefer Stop.
# =============================================================================
reaction_mode: uni
masking: reaction_valid
# Reward type. ``final_qed`` returns QED(s_{t+1}) at every successful template
# step and 0 when Stop is selected. PPO/A2C/GraphTransRL kept ``delta_qed`` in
# their own YAMLs; this change is local to the TD3 configs.
reward: final_qed
max_episode_len: 5
dataset:
  training_file: data/Uni/reactants_train.pkl
  test_file: data/Uni/reactants_test.pkl
  templates_file: data/Uni/templates_unimolecolar_explicit.pkl
  start_strategy: random_pool
env:
  algorithm_family: td3_pgfs
  # Discrete uni TD3 (no continuous R2 head); must match header above.
  action_design: td3_uni_discrete
  # Conditional early-stop penalty is DISABLED under ``final_qed``: with
  # Q(template) on the order of ~1-3 (cumulative future QED) and Q(Stop)=0,
  # voluntary Stop is already enormously dominated; the penalty machinery is
  # superfluous. ``stop_penalty_until_step <= 0`` keeps the conditional branch
  # in rewards.stop_reward inert (returns 0). Code path is preserved for
  # delta_qed YAMLs of other algorithms / future experiments.
  use_stop_action: true
  stop_early_penalty: 0.0
  stop_penalty_until_step: -1
  invalid_reaction_penalty: -1.0
training:
  seed: 42
  total_timesteps: 1000000
  # Larger purely-random warm-up so the replay buffer captures many templates
  # per state before the actor/critic commit to a single mode.
  start_timesteps: 200000
  eval_freq: 10000
  n_envs: 1
td3:
  actor_lr: 0.0001
  critic_lr: 0.0003
  gamma: 0.99
  tau: 0.005
  batch_size: 64
  buffer_size: 500000
  policy_freq: 2
  policy_noise: 0.2
  noise_std: 0.1
  noise_clip: 0.2
  # Slower temperature decay keeps Gumbel-Softmax actually stochastic for
  # most of training (instead of effectively argmax after a few percent).
  initial_temperature: 2.0
  min_temperature: 0.7
  warmup_stop_probability: 0.0
  # Epsilon-greedy template exploration after warmup; mirrors PPO/A2C's
  # stochastic policy by mixing real random template choices into rollouts.
  training_random_action_prob: 0.3
  training_random_action_min_prob: 0.05
  training_random_action_decay_steps: 500000
  # SAC-discrete-style soft actor-critic update. When true:
  #   • Actor is a masked-softmax categorical (sampled at training time, argmax at eval).
  #   • Loss = -(probs * (Q_all - alpha * log_probs)).sum(-1).mean() (entropy bonus).
  #   • Critic target uses the soft Bellman backup E_{a~π}[Q' - alpha log π].
  # When false the original deterministic-greedy / Gumbel-Softmax path is used.
  # Restricted to reaction_mode=uni (entropy path assumes R2=0 for all actions).
  entropy_regularization: true
  # Initial entropy bonus weight. With auto-tuning enabled below this is just
  # the *starting* value of a learnable alpha. Under final_qed the typical
  # Q-gap is on the order of ~1 (cumulative future QED), so the Boltzmann
  # would collapse to argmax at α=0.1; we rely on auto-tune to bump α upward
  # until the per-state target entropy is met (typical converged α should be
  # closer to 0.5-1.0 — the auto-tune dashboard will confirm).
  entropy_alpha: 0.1
  # Automatic SAC-discrete alpha tuning. When true, alpha self-adjusts each
  # actor update so that the policy entropy stays near ``target_entropy``:
  #   alpha_loss = alpha * (H_actual.detach() - target_entropy)
  # so log_alpha grows when entropy is below target and shrinks when above.
  # Robust to the actual Q-value scale (which the fixed-alpha path is not).
  # Setting to false reverts to the fixed ``entropy_alpha`` value above.
  auto_tune_alpha: true
  # Per-state entropy target as a fraction of each state's H_max:
  #   H_target(s) = target_entropy_ratio * log(N_feasible(s))
  # This scales the constraint with how many actions the state actually has
  # — important here because ~40% of uni starts only offer 2 feasible
  # actions (binary Stop-vs-react), where a fixed-nats target near log(2)=0.69
  # forces the policy to stay near uniform. With ratio=0.5 the agent keeps
  # a 50% exploration cushion on every state, regardless of N_feasible.
  # Set to null to fall back to the fixed-nats ``target_entropy`` below.
  target_entropy_ratio: 0.5
  # Fallback fixed-nats target used only when target_entropy_ratio is null.
  target_entropy: 0.6
  alpha_lr: 0.0003
  save_replay_buffer_in_checkpoints: false
callbacks:
  model_save_freq: 100000
  gradient_save_freq: 100
