search:
  max_paths: null
  max_attempts: null
  max_reactions: null
  max_starts: null
  max_r2_per_template: 100
  greedy_mode: best_action
  results_file: runs/greedy_search_uni_results.txt
  overwrite_results: true
  use_wandb: true
